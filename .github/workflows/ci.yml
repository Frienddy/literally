# CI gate for "Literally" (PRD-011 R11-13, R11-8).
#
# Runs the automated layers of the test pyramid on every PR + push to main:
# typecheck, ESLint, Prettier, Vitest (+coverage), the production build, the
# gzipped bundle-size budget, and the Playwright mobile-emulated E2E suite.
# The real-device matrix and screen-reader passes (PRD-011 R11-4/R11-6) remain
# a manual pre-release gate — emulators can't validate haptics, true install,
# or touch feel (_docs/09 §6).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so PRs don't queue stale work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, unit tests & bundle budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier (format check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Bundle-size budget (NFR-3)
        run: npm run check:size

  e2e:
    name: E2E (Playwright, mobile emulation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E (iPhone 13 + Pixel 7)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
